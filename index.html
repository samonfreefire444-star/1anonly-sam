<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAM</title>

<style>
body {
    margin:0;
    font-family: Arial;
    background: linear-gradient(135deg,#020617,#0f172a,#1e3a8a);
    color:white;
    overflow:hidden;
}

/* INTRO */
#intro {
    position:fixed;
    width:100%;
    height:100%;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    background:black;
}

#samText {
    font-size:65px;
    letter-spacing:15px;
    opacity:0;
    text-shadow:0 0 10px #00f0ff, 0 0 30px #00f0ff, 0 0 60px #00f0ff;
    transition:1s;
}

#cat {
    width:220px;
    position:absolute;
    left:-300px;
    bottom:60px;
    transition:4s linear;
    filter: drop-shadow(0 0 20px cyan);
}

/* MAIN */
#main {
    display:none;
    padding:20px;
    text-align:center;
}

.hero img {
    width:160px;
    border-radius:20px;
    box-shadow:0 0 20px cyan;
}

.links a {
    display:block;
    margin:10px;
    padding:12px;
    border:1px solid #00f0ff;
    border-radius:10px;
    text-decoration:none;
    color:white;
    transition:0.3s;
}

.links a:hover {
    background:#00f0ff;
    color:black;
    box-shadow:0 0 15px #00f0ff;
}

h1 {
    text-shadow:0 0 20px #00f0ff;
}
</style>
</head>

<body>

<!-- INTRO -->
<div id="intro">
    <div id="samText">S A M</div>
    <img id="cat" src="https://cataas.com/cat?width=400" />
    <audio id="bgm" src="https://files.catbox.moe/3x9k8f.mp3"></audio>
</div>

<!-- MAIN -->
<div id="main">

    <h1>SAM</h1>

    <div class="hero">
        <img src="https://cataas.com/cat?width=400">
    </div>

    <p>🔥 Gaming • Developer • Creator 😎</p>

    <h2>💻 Skills</h2>
    <p>Python • Java • C++ • HTML • CSS</p>

    <h2>🎥 Fav YouTubers</h2>
    <div class="links">
        <a href="https://youtube.com/@akshayakz" target="_blank">Akshay AKZ</a>
        <a href="https://youtube.com/@ashvinshibu" target="_blank">Ashvin Shibu</a>
        <a href="https://youtube.com/@malludiscoverytv" target="_blank">Mallu Discovery TV</a>
        <a href="https://youtube.com/@bananachipyt" target="_blank">BananaChipYT</a>
    </div>

    <h2>💬 Discord</h2>
    <div class="links">
        <a href="https://discord.gg/zcTA3RPmc" target="_blank">🔥 Join My Server</a>
    </div>

    <p>Discord ID: 1145383325280764005</p>

</div>

<script>

let cat = document.getElementById("cat");
let text = document.getElementById("samText");
let bgm = document.getElementById("bgm");

// autoplay fix
window.addEventListener("click", ()=>{
    bgm.play();
}, {once:true});

// cat walk
setTimeout(()=>{
    cat.style.left = "38%";
},500);

// SAM text glow
setTimeout(()=>{
    text.style.opacity = "1";
},3000);

// end intro
setTimeout(()=>{
    document.getElementById("intro").style.display="none";
    document.getElementById("main").style.display="block";
    document.body.style.overflow="auto";
    bgm.pause();
},8000);

</script>

</body>
</html>
