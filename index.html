<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SAM | Emerald Terminal</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --emerald: #50c878; --dark: #050a05; }
        body { background: var(--dark); color: white; font-family: 'Space Mono', monospace; margin: 0; display: flex; justify-content: center; padding: 20px; }
        
        /* Blur Background Video */
        .bg-video { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: -1; filter: blur(20px) brightness(0.3); }

        .container { max-width: 450px; width: 100%; }
        .card { background: rgba(10, 20, 10, 0.6); border: 1px solid var(--emerald); padding: 20px; border-radius: 15px; margin-bottom: 20px; backdrop-filter: blur(10px); }
        
        /* Typing Effect Text */
        .typing-text { color: var(--emerald); font-weight: bold; border-right: 2px solid var(--emerald); padding-right: 5px; animation: blink 0.7s infinite; }
        @keyframes blink { 50% { border-color: transparent; } }

        .tech-list { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .tech-pill { border: 1px solid var(--emerald); padding: 8px; text-align: center; border-radius: 5px; font-size: 12px; }
    </style>
</head>
<body>

    <!-- Emerald Blur Background -->
    <video autoplay loop muted playsinline class="bg-video">
        <source src="https://assets.mixkit.co/videos/preview/mixkit-abstract-green-particles-background-35756-large.mp4" type="video/mp4">
    </video>

    <div class="container">
        <!-- Identity Card -->
        <div class="card">
            <h1>SAM</h1>
            <p>Accessing System: <span class="typing-text" id="typewriter"></span></p>
        </div>

        <!-- Tech Stack -->
        <div class="card">
            <h3 style="color: var(--emerald);">CORE ARCHITECTURE</h3>
            <div class="tech-list">
                <div class="tech-pill">PYTHON</div>
                <div class="tech-pill">HTML/CSS</div>
                <div class="tech-pill">C++</div>
                <div class="tech-pill">JAVA</div>
            </div>
        </div>

        <!-- Discord Profile -->
        <div class="card">
            <h3 style="color: var(--emerald);">DISCORD_IDENTITY</h3>
            <div id="dc-widget" style="display: flex; align-items: center; gap: 10px; margin-top: 10px;">
                <img id="avatar" src="" style="width: 50px; border-radius: 50%; border: 2px solid var(--emerald);">
                <div>
                    <div id="ds-user" style="font-weight: bold;">Loading...</div>
                    <div id="ds-status" style="font-size: 12px; color: #888;">Syncing...</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Typing Effect Script
        const roles = ["GAMER", "CREATIVE MIND", "DEVELOPER", "ROBLOX PRO"];
        let roleIdx = 0, charIdx = 0;
        function type() {
            const el = document.getElementById("typewriter");
            el.innerText = roles[roleIdx].substring(0, charIdx);
            charIdx++;
            if(charIdx > roles[roleIdx].length) { charIdx = 0; roleIdx = (roleIdx + 1) % roles.length; }
            setTimeout(type, 150);
        }
        type();

        // Discord Data
        async function fetchDC() {
            const res = await fetch("https://api.lanyard.rest/v1/users/1145383325280764005");
            const data = (await res.json()).data;
            document.getElementById('avatar').src = `https://cdn.discordapp.com/avatars/${data.discord_user.id}/${data.discord_user.avatar}.png`;
            document.getElementById('ds-user').innerText = data.discord_user.username;
            document.getElementById('ds-status').innerText = data.discord_status.toUpperCase();
        }
        fetchDC();
    </script>
</body>
</html>
